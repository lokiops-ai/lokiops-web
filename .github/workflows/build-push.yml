name: Build and Push Container Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get next semver tag
        id: semver
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v*.*.*' | sort -V | tail -n 1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.0.1"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.semver.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest

      - name: Update rollout manifest and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          sed -i "s|image: ghcr.io/lokiops-ai/lokiops-web:.*|image: ghcr.io/lokiops-ai/lokiops-web:${{ steps.semver.outputs.tag }}|" k8s/web-rollout.yaml
          git add k8s/web-rollout.yaml
          git diff --staged --quiet || {
            git commit -m "chore: update lokiops-web image to ${{ steps.semver.outputs.tag }} [skip ci]"
            git push origin main
          }
          git tag ${{ steps.semver.outputs.tag }}
          git push origin ${{ steps.semver.outputs.tag }}
