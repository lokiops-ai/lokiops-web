apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: lokiops-web
  namespace: lokiops-web
spec:
  replicas: 2
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - setWeight: 50
        - pause: {duration: 30s}
  selector:
    matchLabels:
      app: lokiops-web
  template:
    metadata:
      labels:
        app: lokiops-web
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: web
          image: ghcr.io/lokiops-ai/lokiops-web:v0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: lokiops-web
  namespace: lokiops-web
spec:
  type: ClusterIP
  selector:
    app: lokiops-web
  ports:
    - port: 80
      targetPort: 3000
